<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 Pong Garden 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5eedc;
    --warm-white: #fdf8f0;
    --sage: #8fa882;
    --sage-dark: #5c7a55;
    --rose: #d4856a;
    --rose-light: #e8a898;
    --lavender: #b8a9c9;
    --lavender-light: #d4cce0;
    --brown: #7a5c45;
    --brown-light: #a07850;
    --gold: #c8a84b;
    --blush: #f0d0c0;
    --moss: #6b7c5a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--warm-white);
    font-family: 'Lora', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(143,168,130,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(212,133,106,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(184,169,201,0.10) 0%, transparent 60%);
  }

  /* Floating background petals */
  .bg-petal {
    position: fixed;
    pointer-events: none;
    opacity: 0.18;
    animation: floatPetal linear infinite;
    font-size: 1.5rem;
    z-index: 0;
  }

  @keyframes floatPetal {
    0% { transform: translateY(110vh) rotate(0deg) scale(0.8); opacity: 0; }
    10% { opacity: 0.18; }
    90% { opacity: 0.18; }
    100% { transform: translateY(-10vh) rotate(360deg) scale(1.2); opacity: 0; }
  }

  /* Main container */
  .game-wrapper {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 20px;
  }

  /* Title */
  .title {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    color: var(--brown);
    text-align: center;
    text-shadow: 1px 1px 0 rgba(200,168,75,0.3);
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  /* Score area */
  .score-board {
    display: flex;
    align-items: center;
    gap: 30px;
    background: rgba(245,238,220,0.85);
    border: 2px solid var(--gold);
    border-radius: 50px;
    padding: 8px 30px;
    box-shadow: 0 2px 12px rgba(122,92,69,0.15), inset 0 1px 0 rgba(255,255,255,0.8);
    backdrop-filter: blur(4px);
  }

  .score-player {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .score-label {
    font-size: 0.65rem;
    color: var(--brown-light);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-family: 'Lora', serif;
  }

  .score-number {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 5vw, 2.4rem);
    color: var(--brown);
    line-height: 1;
  }

  .score-divider {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--gold);
    opacity: 0.6;
  }

  /* Canvas container */
  .canvas-container {
    position: relative;
    border-radius: 18px;
    overflow: hidden;
    box-shadow:
      0 8px 32px rgba(122,92,69,0.25),
      0 2px 8px rgba(122,92,69,0.15),
      inset 0 0 0 3px rgba(200,168,75,0.4),
      inset 0 0 0 6px rgba(245,238,220,0.6);
  }

  canvas {
    display: block;
    border-radius: 14px;
  }

  /* Controls hint */
  .controls-hint {
    display: flex;
    gap: 24px;
    align-items: center;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .control-label {
    font-size: 0.7rem;
    color: var(--brown-light);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .keys {
    display: flex;
    gap: 4px;
  }

  .key {
    background: var(--cream);
    border: 1.5px solid var(--gold);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 0.75rem;
    color: var(--brown);
    font-family: 'Lora', serif;
    box-shadow: 0 2px 0 rgba(122,92,69,0.25);
  }

  /* Overlay screens */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    border-radius: 14px;
    background: rgba(253,248,240,0.92);
    backdrop-filter: blur(8px);
    z-index: 20;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }

  .overlay.visible {
    opacity: 1;
    pointer-events: all;
  }

  .overlay-title {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(1.4rem, 5vw, 2rem);
    color: var(--brown);
    text-align: center;
  }

  .overlay-sub {
    font-size: 0.85rem;
    color: var(--brown-light);
    text-align: center;
    line-height: 1.6;
  }

  .btn {
    background: linear-gradient(135deg, var(--sage) 0%, var(--sage-dark) 100%);
    color: var(--warm-white);
    border: none;
    border-radius: 50px;
    padding: 10px 28px;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1rem;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(92,122,85,0.35), inset 0 1px 0 rgba(255,255,255,0.3);
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 0.04em;
  }

  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(92,122,85,0.45), inset 0 1px 0 rgba(255,255,255,0.3);
  }

  .btn:active {
    transform: translateY(0);
  }

  /* Particle canvas */
  #particleCanvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 5;
  }

  /* Corner decorations */
  .corner {
    position: fixed;
    font-size: 2.5rem;
    opacity: 0.2;
    pointer-events: none;
    z-index: 1;
  }
  .corner-tl { top: 12px; left: 12px; transform: rotate(-15deg); }
  .corner-tr { top: 12px; right: 12px; transform: rotate(15deg); }
  .corner-bl { bottom: 12px; left: 12px; transform: rotate(15deg); }
  .corner-br { bottom: 12px; right: 12px; transform: rotate(-15deg); }
</style>
</head>
<body>

<!-- Corner decorations -->
<div class="corner corner-tl">🌿</div>
<div class="corner corner-tr">🌸</div>
<div class="corner corner-bl">🍄</div>
<div class="corner corner-br">🌼</div>

<!-- Particle canvas -->
<canvas id="particleCanvas"></canvas>

<!-- Floating bg petals -->
<div id="bgPetals"></div>

<div class="game-wrapper">
  <div class="title">🌸 Pong Garden 🌿</div>

  <div class="score-board">
    <div class="score-player">
      <span class="score-label">🌿 Hierbas</span>
      <span class="score-number" id="score1">0</span>
    </div>
    <span class="score-divider">✦</span>
    <div class="score-player">
      <span class="score-label">Flores 🌸</span>
      <span class="score-number" id="score2">0</span>
    </div>
  </div>

  <div class="canvas-container">
    <canvas id="gameCanvas"></canvas>
    <div class="overlay visible" id="startOverlay">
      <div style="font-size:3rem">🌸</div>
      <div class="overlay-title">Bienvenide al jardín</div>
      <div class="overlay-sub">Un juego de Pong encantado<br>entre flores y hierbas silvestres</div>
      <button class="btn" onclick="startGame()">✦ Comenzar a jugar ✦</button>
    </div>
    <div class="overlay" id="winOverlay">
      <div style="font-size:3rem" id="winEmoji">🏆</div>
      <div class="overlay-title" id="winText">¡Ganaste!</div>
      <div class="overlay-sub">El jardín te corona con flores</div>
      <button class="btn" onclick="resetGame()">✦ Jugar de nuevo ✦</button>
    </div>
  </div>

  <div class="controls-hint">
    <div class="control-group">
      <span class="control-label">🌿 Hierbas</span>
      <div class="keys">
        <span class="key">A</span>
        <span class="key">Z</span>
      </div>
    </div>
    <div style="color:var(--gold); font-size:1.2rem">✦</div>
    <div class="control-group">
      <span class="control-label">Flores 🌸</span>
      <div class="keys">
        <span class="key">↑</span>
        <span class="key">↓</span>
      </div>
    </div>
  </div>
</div>

<script>
// ─── Setup ───────────────────────────────────────────────────────────────────
const gameCanvas = document.getElementById('gameCanvas');
const ctx = gameCanvas.getContext('2d');
const particleCanvas = document.getElementById('particleCanvas');
const pCtx = particleCanvas.getContext('2d');

let W, H;
function resize() {
  const maxW = Math.min(window.innerWidth - 40, 700);
  const maxH = Math.min(window.innerHeight - 260, 440);
  W = gameCanvas.width = Math.max(300, maxW);
  H = gameCanvas.height = Math.max(200, maxH);
  particleCanvas.width = window.innerWidth;
  particleCanvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); initPositions(); });

// ─── Colors ──────────────────────────────────────────────────────────────────
const COLORS = {
  bg: '#f5eedc',
  bgDark: '#ede5d0',
  sage: '#8fa882',
  sageDark: '#5c7a55',
  rose: '#d4856a',
  roseDark: '#b86248',
  gold: '#c8a84b',
  brown: '#7a5c45',
  cream: '#fdf8f0',
  lavender: '#b8a9c9',
};

// ─── Game state ───────────────────────────────────────────────────────────────
const PADDLE_W = 14, PADDLE_H_RATIO = 0.18;
const BALL_R = 10;
const WIN_SCORE = 7;
const SPEED_INC = 0.4;

let state = 'idle'; // idle | playing | win
let keys = {};
let score = [0, 0];
let particles = [];
let flowerParticles = [];

let paddle1, paddle2, ball;

function initPositions() {
  const ph = H * PADDLE_H_RATIO;
  paddle1 = { x: 20, y: H/2 - ph/2, w: PADDLE_W, h: ph, dy: 0 };
  paddle2 = { x: W - 20 - PADDLE_W, y: H/2 - ph/2, w: PADDLE_W, h: ph, dy: 0 };
  resetBall();
}

function resetBall() {
  const angle = (Math.random() * 60 - 30) * Math.PI / 180;
  const dir = Math.random() < 0.5 ? 1 : -1;
  const speed = W * 0.008;
  ball = {
    x: W/2, y: H/2,
    r: BALL_R,
    vx: Math.cos(angle) * speed * dir,
    vy: Math.sin(angle) * speed,
    trail: [],
    wobble: 0,
  };
}

initPositions();

// ─── Input ────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if(['ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// ─── Particles ────────────────────────────────────────────────────────────────
const FLOWERS = ['🌸','🌼','🌺','🌷','🌻','🍀','🌿','🪷','✿','❀'];
const PETALS = ['🌸','🌼','🌺','🌷'];

function spawnFlowers(x, y, count = 8) {
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
    const speed = 2 + Math.random() * 3;
    flowerParticles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1,
      emoji: FLOWERS[Math.floor(Math.random() * FLOWERS.length)],
      life: 1,
      decay: 0.022 + Math.random() * 0.015,
      size: 14 + Math.random() * 10,
      rot: Math.random() * 360,
      rotV: (Math.random() - 0.5) * 8,
      scale: 1,
    });
  }
}

function spawnScoreFlowers(x, y) {
  for (let i = 0; i < 20; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 5;
    flowerParticles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 2,
      emoji: FLOWERS[Math.floor(Math.random() * FLOWERS.length)],
      life: 1,
      decay: 0.012 + Math.random() * 0.01,
      size: 16 + Math.random() * 14,
      rot: Math.random() * 360,
      rotV: (Math.random() - 0.5) * 12,
      scale: 1,
    });
  }
}

// ─── Update ───────────────────────────────────────────────────────────────────
const SPEED = 6.5;

function update() {
  if (state !== 'playing') return;

  // Paddles
  if (keys['a'] || keys['A']) paddle1.y -= SPEED;
  if (keys['z'] || keys['Z']) paddle1.y += SPEED;
  if (keys['ArrowUp'])   paddle2.y -= SPEED;
  if (keys['ArrowDown']) paddle2.y += SPEED;

  paddle1.y = Math.max(0, Math.min(H - paddle1.h, paddle1.y));
  paddle2.y = Math.max(0, Math.min(H - paddle2.h, paddle2.y));

  // Ball trail
  ball.trail.push({ x: ball.x, y: ball.y });
  if (ball.trail.length > 10) ball.trail.shift();

  // Ball move
  ball.x += ball.vx;
  ball.y += ball.vy;
  ball.wobble *= 0.85;

  // Wall bounce (top/bottom)
  if (ball.y - ball.r <= 0) { ball.y = ball.r; ball.vy = Math.abs(ball.vy); spawnFlowers(ball.x, ball.y, 4); }
  if (ball.y + ball.r >= H) { ball.y = H - ball.r; ball.vy = -Math.abs(ball.vy); spawnFlowers(ball.x, ball.y, 4); }

  // Paddle collision helper
  function hitPaddle(p) {
    return ball.x - ball.r < p.x + p.w &&
           ball.x + ball.r > p.x &&
           ball.y > p.y && ball.y < p.y + p.h;
  }

  // Paddle 1 (left)
  if (hitPaddle(paddle1)) {
    ball.x = paddle1.x + paddle1.w + ball.r;
    const rel = (ball.y - (paddle1.y + paddle1.h/2)) / (paddle1.h/2);
    const angle = rel * 60 * Math.PI / 180;
    const spd = Math.min(Math.hypot(ball.vx, ball.vy) + SPEED_INC, W * 0.018);
    ball.vx = Math.cos(angle) * spd;
    ball.vy = Math.sin(angle) * spd;
    ball.wobble = 1.3;
    spawnFlowers(ball.x, ball.y, 6);
  }

  // Paddle 2 (right)
  if (hitPaddle(paddle2)) {
    ball.x = paddle2.x - ball.r;
    const rel = (ball.y - (paddle2.y + paddle2.h/2)) / (paddle2.h/2);
    const angle = rel * 60 * Math.PI / 180;
    const spd = Math.min(Math.hypot(ball.vx, ball.vy) + SPEED_INC, W * 0.018);
    ball.vx = -Math.cos(angle) * spd;
    ball.vy = Math.sin(angle) * spd;
    ball.wobble = 1.3;
    spawnFlowers(ball.x, ball.y, 6);
  }

  // Scoring
  if (ball.x + ball.r < 0) {
    score[1]++;
    document.getElementById('score2').textContent = score[1];
    spawnScoreFlowers(W * 0.75, H/2);
    checkWin() || resetBall();
  }
  if (ball.x - ball.r > W) {
    score[0]++;
    document.getElementById('score1').textContent = score[0];
    spawnScoreFlowers(W * 0.25, H/2);
    checkWin() || resetBall();
  }

  // Update flower particles
  for (let i = flowerParticles.length - 1; i >= 0; i--) {
    const p = flowerParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.08;
    p.vx *= 0.98;
    p.rot += p.rotV;
    p.life -= p.decay;
    if (p.life <= 0) flowerParticles.splice(i, 1);
  }
}

function checkWin() {
  if (score[0] >= WIN_SCORE || score[1] >= WIN_SCORE) {
    state = 'win';
    const winner = score[0] >= WIN_SCORE ? '🌿 ¡Hierbas gana!' : '🌸 ¡Flores gana!';
    document.getElementById('winText').textContent = winner;
    document.getElementById('winEmoji').textContent = score[0] >= WIN_SCORE ? '🌿' : '🌸';
    document.getElementById('winOverlay').classList.add('visible');
    // Big celebration
    for(let i=0;i<3;i++) setTimeout(()=>spawnScoreFlowers(W/2, H/2), i*300);
    return true;
  }
  return false;
}

// ─── Draw ─────────────────────────────────────────────────────────────────────

// Floral emoji sets for paddles
const PADDLE1_EMOJIS = ['🌿','🍀','🌱'];
const PADDLE2_EMOJIS = ['🌸','🌷','🌺'];

function drawPaddle(p, emojis, color) {
  // Shadow
  ctx.save();
  ctx.shadowColor = 'rgba(122,92,69,0.25)';
  ctx.shadowBlur = 10;
  ctx.shadowOffsetX = 3;
  ctx.shadowOffsetY = 3;

  // Body
  const grad = ctx.createLinearGradient(p.x, p.y, p.x + p.w, p.y + p.h);
  grad.addColorStop(0, color === 'sage' ? COLORS.sage : COLORS.rose);
  grad.addColorStop(1, color === 'sage' ? COLORS.sageDark : COLORS.roseDark);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(p.x, p.y, p.w, p.h, 8);
  ctx.fill();
  ctx.restore();

  // Border
  ctx.strokeStyle = COLORS.gold;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.roundRect(p.x, p.y, p.w, p.h, 8);
  ctx.stroke();

  // Emoji decorations
  ctx.font = `${Math.min(p.h * 0.22, 16)}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const steps = Math.min(emojis.length, 3);
  for (let i = 0; i < steps; i++) {
    const yy = p.y + (p.h / (steps + 1)) * (i + 1);
    ctx.globalAlpha = 0.85;
    ctx.fillText(emojis[i % emojis.length], p.x + p.w/2, yy);
  }
  ctx.globalAlpha = 1;
}

function drawBall() {
  const s = ball.wobble > 1 ? ball.wobble : 1;

  // Trail
  ball.trail.forEach((t, i) => {
    const alpha = (i / ball.trail.length) * 0.35;
    const size = (ball.r * 0.5) * (i / ball.trail.length);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = COLORS.lavender;
    ctx.beginPath();
    ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Glow
  ctx.save();
  ctx.shadowColor = COLORS.rose;
  ctx.shadowBlur = 18;

  // Ball body
  const grad = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 1, ball.x, ball.y, ball.r * s);
  grad.addColorStop(0, '#fff0ea');
  grad.addColorStop(0.5, COLORS.roseDark);
  grad.addColorStop(1, COLORS.rose);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.ellipse(ball.x, ball.y, ball.r * s, ball.r / s, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();

  // Emoji on ball
  ctx.font = `${ball.r * 1.4}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.globalAlpha = 0.9;
  ctx.fillText('🌸', ball.x, ball.y);
  ctx.globalAlpha = 1;
}

function drawBackground() {
  // Base
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, W, H);

  // Subtle texture pattern
  ctx.strokeStyle = 'rgba(200,168,75,0.08)';
  ctx.lineWidth = 1;
  for (let y = 0; y < H; y += 28) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  for (let x = 0; x < W; x += 28) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }

  // Center line — floral dashes
  ctx.setLineDash([6, 12]);
  ctx.strokeStyle = COLORS.gold;
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = 0.35;
  ctx.beginPath();
  ctx.moveTo(W/2, 0);
  ctx.lineTo(W/2, H);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.globalAlpha = 1;

  // Center flower
  ctx.font = '18px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.globalAlpha = 0.18;
  ctx.fillText('🌼', W/2, H/2);
  ctx.globalAlpha = 1;

  // Corner vignette
  const vig = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.85);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(122,92,69,0.08)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);
}

function drawFlowerParticles() {
  flowerParticles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.font = `${p.size}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot * Math.PI / 180);
    ctx.scale(p.scale, p.scale);
    ctx.fillText(p.emoji, 0, 0);
    ctx.restore();
  });
}

// ─── Ambient floating petals on particle canvas ───────────────────────────────
let ambientPetals = [];
function initAmbientPetals() {
  ambientPetals = [];
  for (let i = 0; i < 14; i++) {
    ambientPetals.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      emoji: PETALS[Math.floor(Math.random() * PETALS.length)],
      size: 12 + Math.random() * 10,
      speed: 0.3 + Math.random() * 0.5,
      drift: (Math.random() - 0.5) * 0.4,
      rot: Math.random() * 360,
      rotV: (Math.random() - 0.5) * 0.8,
      opacity: 0.08 + Math.random() * 0.12,
    });
  }
}
initAmbientPetals();

function drawAmbientPetals() {
  pCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
  ambientPetals.forEach(p => {
    p.y -= p.speed;
    p.x += p.drift;
    p.rot += p.rotV;
    if (p.y < -30) { p.y = particleCanvas.height + 20; p.x = Math.random() * particleCanvas.width; }
    if (p.x < -30) p.x = particleCanvas.width + 20;
    if (p.x > particleCanvas.width + 30) p.x = -20;

    pCtx.save();
    pCtx.globalAlpha = p.opacity;
    pCtx.font = `${p.size}px serif`;
    pCtx.textAlign = 'center';
    pCtx.textBaseline = 'middle';
    pCtx.translate(p.x, p.y);
    pCtx.rotate(p.rot * Math.PI / 180);
    pCtx.fillText(p.emoji, 0, 0);
    pCtx.restore();
  });
}

// ─── Game loop ────────────────────────────────────────────────────────────────
function draw() {
  drawBackground();
  drawPaddle(paddle1, PADDLE1_EMOJIS, 'sage');
  drawPaddle(paddle2, PADDLE2_EMOJIS, 'rose');
  if (state !== 'idle') drawBall();
  drawFlowerParticles();
  drawAmbientPetals();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();

// ─── Controls ─────────────────────────────────────────────────────────────────
function startGame() {
  score = [0, 0];
  document.getElementById('score1').textContent = '0';
  document.getElementById('score2').textContent = '0';
  document.getElementById('startOverlay').classList.remove('visible');
  document.getElementById('winOverlay').classList.remove('visible');
  initPositions();
  state = 'playing';
}

function resetGame() {
  document.getElementById('winOverlay').classList.remove('visible');
  score = [0, 0];
  document.getElementById('score1').textContent = '0';
  document.getElementById('score2').textContent = '0';
  initPositions();
  state = 'playing';
}

// Touch controls for mobile
let touchStartY = null;
gameCanvas.addEventListener('touchstart', e => {
  touchStartY = e.touches[0].clientY;
  if(state === 'idle') startGame();
}, {passive:true});

gameCanvas.addEventListener('touchmove', e => {
  if (!touchStartY) return;
  const dy = e.touches[0].clientY - touchStartY;
  const cx = e.touches[0].clientX;
  const rect = gameCanvas.getBoundingClientRect();
  const relX = cx - rect.left;
  if (relX < W/2) {
    paddle1.y = Math.max(0, Math.min(H - paddle1.h, paddle1.y + dy));
  } else {
    paddle2.y = Math.max(0, Math.min(H - paddle2.h, paddle2.y + dy));
  }
  touchStartY = e.touches[0].clientY;
}, {passive:true});

// ─── Background petals DOM ────────────────────────────────────────────────────
const bgPetals = document.getElementById('bgPetals');
const bgPetalEmojis = ['🌸','🌼','🌺','🌷','🍀','🌿','✿'];
for (let i = 0; i < 12; i++) {
  const el = document.createElement('div');
  el.className = 'bg-petal';
  el.textContent = bgPetalEmojis[i % bgPetalEmojis.length];
  el.style.left = (Math.random() * 100) + 'vw';
  el.style.animationDuration = (12 + Math.random() * 18) + 's';
  el.style.animationDelay = (Math.random() * 20) + 's';
  el.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
  bgPetals.appendChild(el);
}
</script>
